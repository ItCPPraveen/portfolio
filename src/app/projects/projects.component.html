<div class="container py-5">
  <div class="projects_header text-center mb-5">
    <h2 class="section_title">PROJECTS</h2>
    <div class="title_bar mx-auto"></div>
  </div>

  <div class="row">
    <div class="col-lg-6 col-12 mb-4" *ngFor="let project of projects">
      <div class="project_card h-100 d-flex flex-column justify-content-between">
        <div class="card_header_section">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <h3 class="project_title">{{ project.title }}</h3>
            <span class="project_subtitle badge">{{ project.subtitle }}</span>
          </div>

          <div class="project_meta mb-3">
            <span class="meta_item text-muted mr-3">
              <i class="fa fa-briefcase mr-1"></i> {{ project.role }}
            </span>
            <span class="meta_item text-muted" *ngIf="project.timeline">
              <i class="fa fa-calendar mr-1"></i> {{ project.timeline }}
            </span>
          </div>

          <p class="project_desc">{{ project.description }}</p>

          <div class="achievements_section mb-4">
            <h4 class="section_subtitle mb-2">Key Contributions</h4>
            <ul class="achievements_list">
              <li *ngFor="let ach of project.achievements">
                <i class="fa fa-circle-notch list_bullet mr-2"></i>
                <span>{{ ach }}</span>
              </li>
            </ul>
          </div>
        </div>

        <div class="card_footer_section mt-auto">
          <div class="tech_tags d-flex flex-wrap gap-2 mb-4">
            <span class="tech_tag" *ngFor="let tag of project.tags">{{ tag }}</span>
          </div>

          <div class="project_links d-flex justify-content-start" *ngIf="project.links && project.links.length > 0">
            <a *ngFor="let link of project.links" [href]="link.url" target="_blank" class="btn btn-outline-light btn-sm mr-2 project_link_btn">
              <i class="fa {{ link.icon }} mr-1"></i> {{ link.name }}
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
